<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toán Lớp 1 — Học Vui Mỗi Ngày</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-left">
    <div class="top-brand" onclick="goHome()"><span id="topCap"></span> Toán Lớp 1</div>
  </div>
  <div class="top-stats">
    <span class="top-stat"><span id="topStarIcon"></span> <span id="topStars">0</span></span>
    <span class="top-stat"><span id="topXPIcon"></span> <span id="topXP">0</span> XP</span>
    <span class="top-stat"><span id="topFireIcon"></span> <span id="topStreak">0</span></span>
    <span class="top-stat"><span id="topLvIcon"></span> <span id="topLevel">1</span></span>
  </div>
  <div class="top-right">
    <button class="top-btn" onclick="openParent()"><span class="top-icon-parent"></span> Phụ huynh</button>
  </div>
</div>

<main>

<!-- ═══════════════════════════════════ -->
<!--  VIEW: WORLD MAP                   -->
<!-- ═══════════════════════════════════ -->
<div class="view" id="view-map">
  <div class="map-title">🗺️ Bản Đồ Học Tập</div>
  <div class="map-subtitle">Chọn một thế giới để bắt đầu học!</div>
  <div class="world-grid" id="worldGrid"></div>

  <div class="map-actions">
    <button class="map-btn map-btn-brain" onclick="openBrainGames()">
      <span class="map-btn-icon" id="brainIcon"></span>
      <span>Trò Chơi Tư Duy <small>(<span id="brainGameCount">0</span> hoàn thành)</small></span>
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════ -->
<!--  VIEW: WORLD DETAIL (Units)        -->
<!-- ═══════════════════════════════════ -->
<div class="view" id="view-world">
  <div class="back-row"><button class="back-btn" onclick="goHome()">← Trang chủ</button></div>
  <div class="section-card">
    <div class="wd-header" id="wdHeader"></div>
    <div id="wdUnits"></div>
    <div id="wdBoss"></div>
  </div>
</div>

<!-- ═══════════════════════════════════ -->
<!--  VIEW: UNIT MENU                   -->
<!-- ═══════════════════════════════════ -->
<div class="view" id="view-unitmenu">
  <div class="back-row"><button class="back-btn" onclick="openWorld(currentWorld?.id)">← Quay lại</button></div>
  <div class="section-card" id="unitMenuContent"></div>
</div>

<!-- ═══════════════════════════════════ -->
<!--  VIEW: LESSON                      -->
<!-- ═══════════════════════════════════ -->
<div class="view" id="view-lesson">
  <div class="back-row">
    <button class="back-btn" onclick="showUnitMenu()">← Quay lại</button>
    <span id="lessonProgress" style="float:right;font-size:.85rem;color:#64748b;"></span>
  </div>
  <div id="lessonContent"></div>
</div>

<!-- ═══════════════════════════════════ -->
<!--  VIEW: QUIZ / TRY IT / BOSS       -->
<!-- ═══════════════════════════════════ -->
<div class="view" id="view-quiz">
  <div class="back-row"><button class="back-btn" onclick="showUnitMenu()">← Quay lại</button></div>
  <div class="section-card" id="quizContent"></div>
</div>

<!-- ═══════════════════════════════════ -->
<!--  VIEW: BRAIN GAMES LIST            -->
<!-- ═══════════════════════════════════ -->
<div class="view" id="view-braingames">
  <div class="back-row"><button class="back-btn" onclick="goHome()">← Trang chủ</button></div>
  <div class="bg-title">🧠 Trò Chơi Tư Duy</div>
  <div class="bg-subtitle">Rèn luyện tư duy logic từ chương trình Singapore Math & Mỹ</div>
  <div id="bgList"></div>
</div>

<!-- ═══════════════════════════════════ -->
<!--  VIEW: PARENT DASHBOARD            -->
<!-- ═══════════════════════════════════ -->
<div class="view" id="view-parent">
  <div class="back-row"><button class="back-btn" onclick="goHome()">← Trang chủ</button></div>
  <div class="pd-title"><span id="pdChartIcon"></span> Bảng Theo Dõi — Phụ Huynh</div>
  <div class="section-card" id="parentContent"></div>
</div>

</main>

<!-- Notes FAB -->
<button class="notes-fab" onclick="toggleNotesPanel()" title="Ghi chú">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg>
  <span class="fab-badge" id="notesBadge" style="display:none">0</span>
</button>

<!-- Notes Panel -->
<div class="notes-panel" id="notesPanel">
  <div class="notes-header">
    <h3>Ghi Chú</h3>
    <button class="notes-close" onclick="toggleNotesPanel()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="notes-body" id="notesList"></div>
  <div class="notes-footer">
    <div class="notes-selects">
      <select class="note-select" id="noteTagSelect">
        <option value="question">Câu hỏi</option>
        <option value="issue">Khó khăn</option>
        <option value="tip">Mẹo hay</option>
        <option value="general">Chung</option>
      </select>
      <select class="note-select" id="noteSectionSelect">
        <option value="">Không có</option>
        <option value="Hình học">Hình học</option>
        <option value="Số học">Số học</option>
        <option value="Cộng trừ">Cộng trừ</option>
        <option value="Đồng hồ">Đồng hồ</option>
        <option value="Đo lường">Đo lường</option>
      </select>
    </div>
    <div class="notes-input-row">
      <textarea class="note-textarea" id="noteInput" placeholder="Viết ghi chú..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addNote();}"></textarea>
      <button class="note-add-btn" onclick="addNote()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="js/data.js?v=2"></script>
<script src="js/data-extra.js?v=2"></script>
<script src="js/engine.js?v=2"></script>
<script src="js/app.js?v=2"></script>
</body>
</html>
